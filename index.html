<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古文用言 神経衰弱 - 単語と活用の種類を合わせるゲーム</title>
  <meta name="description" content="Googleスプレッドシートをデータベースにして、古文の単語（用言）とその活用の種類を神経衰弱形式で楽しく学べる教育ゲームアプリです。">
  
  <!-- Google Fonts: 游明朝やNoto Serif JPで美しい和風デザインを実現 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Serif+JP:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pattern-bg"></div>
  
  <header>
    <div class="header-container">
      <h1 id="app-title"><i class="fa-solid fa-scroll"></i> 古文用言 神経衰弱</h1>
      <p class="subtitle">雅やかなカードをめくり、古典の言葉を紡ぐ</p>
    </div>
  </header>

  <main class="container">
    <!-- 設定画面 -->
    <section id="setup-screen" class="card-panel">
      <div class="panel-header">
        <h2><i class="fa-solid fa-gear"></i> 稽古の設定</h2>
      </div>
      
      <div class="form-group">
        <label for="gas-url-input">
          <i class="fa-solid fa-link"></i> スプレッドシート API URL
          <span class="tooltip-trigger"><i class="fa-solid fa-circle-question"></i>
            <span class="tooltip-text">GASでデプロイしたWebアプリのURLを入力します。空欄の場合は内蔵の標準用言データ（デモデータ）を使用します。</span>
          </span>
        </label>
        <input type="url" id="gas-url-input" placeholder="https://script.google.com/macros/s/.../exec" value="">
        <div id="data-status-msg" class="status-msg">
          <span class="badge info-badge"><i class="fa-solid fa-database"></i> デモデータ（動詞・形容詞など）を使用中</span>
        </div>
      </div>

      <!-- CSVファイル操作 / テンプレート -->
      <div class="form-group template-actions">
        <label><i class="fa-solid fa-file-csv"></i> 自作データ (CSV/JSON) の利用</label>
        <div class="file-action-buttons">
          <button id="download-template-btn" class="btn outline-btn">
            <i class="fa-solid fa-file-arrow-down"></i> テンプレートCSVを保存
          </button>
          
          <div class="file-upload-wrapper">
            <input type="file" id="upload-csv-input" accept=".csv,.json" style="display: none;">
            <button id="upload-csv-btn" class="btn outline-btn">
              <i class="fa-solid fa-file-arrow-up"></i> ファイルを読み込む
            </button>
          </div>
        </div>
      </div>

      <div class="grid-2col">
        <!-- 対戦・プレイ人数設定 -->
        <div class="form-group">
          <label><i class="fa-solid fa-users"></i> プレイ人数</label>
          <div class="segmented-control">
            <input type="radio" id="play-mode-1p" name="play-mode" value="1p" checked>
            <label for="play-mode-1p" class="control-btn"><i class="fa-solid fa-user"></i> 一人（独習）</label>
            
            <input type="radio" id="play-mode-2p" name="play-mode" value="2p">
            <label for="play-mode-2p" class="control-btn"><i class="fa-solid fa-user-group"></i> 二人（対戦）</label>
          </div>
        </div>

        <!-- カード枚数（難易度） -->
        <div class="form-group">
          <label for="card-pair-select"><i class="fa-solid fa-layer-group"></i> カードの枚数 (ペア数)</label>
          <select id="card-pair-select">
            <option value="6">6ペア (12枚) - 手軽に遊ぶ</option>
            <option value="10" selected>10ペア (20枚) - 標準</option>
            <option value="15">15ペア (30枚) - じっくり</option>
            <option value="20">20ペア (40枚) - 難問</option>
          </select>
        </div>
      </div>

      <div class="action-area">
        <button id="start-game-btn" class="btn primary-btn large-btn">
          <i class="fa-solid fa-play"></i> 稽古をはじめる
        </button>
      </div>
    </section>

    <!-- ゲームプレイ画面 -->
    <section id="game-screen" class="card-panel" style="display: none;">
      <div class="game-header">
        <!-- プレイヤー情報 / スコア -->
        <div class="scoreboard">
          <div id="p1-score-card" class="player-score active">
            <span class="player-avatar"><i class="fa-solid fa-user-ninja"></i></span>
            <div class="player-info">
              <span class="player-name" id="p1-name-display">プレイヤー1</span>
              <span class="player-points"><span id="p1-score">0</span> ペア</span>
            </div>
          </div>
          
          <div id="timer-score-card" class="player-score time-card">
            <span class="player-avatar"><i class="fa-solid fa-stopwatch"></i></span>
            <div class="player-info">
              <span class="player-name">時間 / 手数</span>
              <span class="player-points"><span id="game-timer">00:00</span> (<span id="turns-count">0</span>手)</span>
            </div>
          </div>

          <div id="p2-score-card" class="player-score" style="display: none;">
            <span class="player-avatar"><i class="fa-solid fa-user-samurai"></i></span>
            <div class="player-info">
              <span class="player-name" id="p2-name-display">プレイヤー2</span>
              <span class="player-points"><span id="p2-score">0</span> ペア</span>
            </div>
          </div>
        </div>

        <div class="game-status-bar">
          <div id="turn-announcement" class="announcement">カードをめくってください</div>
          <div id="current-mode-badge" class="badge secondary-badge">単語 ⇔ 活用の種類</div>
        </div>
      </div>

      <!-- カード配置エリア -->
      <div id="card-grid" class="card-grid grid-10-pairs">
        <!-- JSでカードが動的に生成されます -->
      </div>

      <!-- コントロールボタン -->
      <div class="game-controls">
        <button id="back-to-setup-btn" class="btn outline-btn">
          <i class="fa-solid fa-chevron-left"></i> 設定に戻る
        </button>
        <button id="restart-game-btn" class="btn secondary-btn">
          <i class="fa-solid fa-rotate-right"></i> 最初からやり直す
        </button>
      </div>
    </section>
  </main>

  <!-- 結果表示モーダル -->
  <div id="result-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="result-title">対戦結果</h2>
      </div>
      <div class="modal-body">
        <div id="victory-banner" class="victory-banner">
          <i class="fa-solid fa-crown gold-crown"></i>
          <p id="victory-message">プレイヤー1の勝ち！</p>
        </div>
        
        <div class="stats-summary">
          <div class="stat-box">
            <span class="stat-label">経過時間</span>
            <span class="stat-value" id="final-time">00:00</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">総手数</span>
            <span class="stat-value" id="final-turns">0</span>
          </div>
          <div class="stat-box" id="final-score-box">
            <span class="stat-label">獲得ペア</span>
            <span class="stat-value" id="final-pairs">0</span>
          </div>
        </div>

        <!-- 復習用単語リスト -->
        <div class="review-section">
          <h3><i class="fa-solid fa-book-open"></i> 本日のふり返り（獲得用言一覧）</h3>
          <div class="review-table-wrapper">
            <table class="review-table">
              <thead>
                <tr>
                  <th>単語 (基本形)</th>
                  <th>品詞 / 活用の種類</th>
                  <th>代表的な意味</th>
                  <th>主要な活用形</th>
                </tr>
              </thead>
              <tbody id="review-list">
                <!-- 動的に生成されます -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-setup-btn" class="btn outline-btn">設定画面へ</button>
        <button id="modal-replay-btn" class="btn primary-btn">もう一度遊ぶ</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-container">
      <p>古文用言 神経衰弱 © 2026 hamadakazuyuki</p>
      <p class="github-link">
        <a href="https://github.com/Hamakazu0219/kobun-yogen2" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-github"></i> Hamakazu0219/kobun-yogen2
        </a>
      </p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
